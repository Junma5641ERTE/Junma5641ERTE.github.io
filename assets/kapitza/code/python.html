<!doctype html>

  <style>
    :root {

      --bg-white: #ffffff;
      --bg-code: #f7f9fb;

    body {

      color: var(--text-dark);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

    }

    a {
      color: var(--secondary);
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      color: var(--primary);
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 1.2rem;
    }

    .note {
      color: var(--text-gray);
      margin: 0 0 1rem;
    }

    pre {
      margin: 0;
      padding: 1.2rem;
      overflow-x: auto;
      background: var(--bg-code);
      border: 1px solid var(--border);
