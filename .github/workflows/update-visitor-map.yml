name: Update visitor map

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-visitor-map
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Refresh visitor statistics
        run: python scripts/update_visitor_stats.py

      - name: Commit updated statistics
        run: |
          if git diff --quiet -- assets/data/visitor-stats.json; then
            echo "Visitor statistics have not changed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/visitor-stats.json
          git commit -m "Update visitor map statistics"
          git push
